<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сервіс чергувань у лабораторії</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Сервіс чергувань у лабораторії </h1>
      <p>Заповніть форму і натисніть <strong>Зберегти</strong>. Запис з'явиться у таблиці нижче.</p>
    </header>

    <main>
      <section id="toolbar-section" class="toolbar">
        <div class="field">
          <label for="searchInput">Пошук за користувачем</label>
          <input id="searchInput" type="text" placeholder="Введіть ім'я..." />
        </div>
        <div class="field">
          <label for="sortSelect">Сортування за датою</label>
          <select id="sortSelect">
            <option value="asc">Зростання (спочатку старіші)</option>
            <option value="desc">Спадання (спочатку новіші)</option>
          </select>
        </div>
      </section>

      <section id="create-section">
        <h2 id="formTitle">Додати чергування</h2>
        <form id="shiftForm">
          <div class="form-layout">
            <div class="field">
              <label for="dateInput">Дата чергування</label>
              <input id="dateInput" type="date" />
              <p class="error-text" id="dateError"></p>
            </div>

            <div class="field">
              <label for="timeSlotSelect">Проміжок часу</label>
              <select id="timeSlotSelect">
                <option value="">Оберіть проміжок</option>
                <option value="08:00 - 10:00">08:00 - 10:00</option>
                <option value="10:00 - 12:00">10:00 - 12:00</option>
                <option value="12:00 - 14:00">12:00 - 14:00</option>
                <option value="14:00 - 16:00">14:00 - 16:00</option>
              </select>
              <p class="error-text" id="timeSlotError"></p>
            </div>

            <div class="field">
              <label for="userInput">Прізвище та ім'я</label>
              <input id="userInput" type="text" placeholder="Напр., Жданкін Іван" />
              <p class="error-text" id="userError"></p>
            </div>

            <div class="field">
              <label for="statusSelect">Статус</label>
              <select id="statusSelect">
                <option value="">Оберіть статус</option>
                <option value="Заплановано">Заплановано</option>
                <option value="Виконано">Виконано</option>
                <option value="Скасовано">Скасовано</option>
              </select>
              <p class="error-text" id="statusError"></p>
            </div>
          </div>

          <div class="field">
            <label for="commentInput">Коментар (необов’язково)</label>
            <textarea id="commentInput" rows="3" placeholder="Додаткова інформація..."></textarea>
            <p class="error-text" id="commentError"></p>
          </div>

          <div class="buttons">
            <button type="submit" id="submitBtn">Зберегти</button>
            <button type="button" id="resetBtn">Очистити</button>
          </div>
        </form>
      </section>

      <section id="list-section">
        <h2>Список чергувань</h2>
        <table id="itemsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Дата</th>
              <th>Час</th>
              <th>Користувач</th>
              <th>Статус</th>
              <th>Коментар</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody">
            </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
